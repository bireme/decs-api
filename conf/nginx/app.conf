upstream decs_api_app{
    server unix:/tmp/gunicorn.sock fail_timeout=0;
}

server {

    listen 80;
    # disable nginx version signature
    server_tokens off;

    # Recover the real client IP from X-Forwarded-For (set by the fronting
    # nginx-proxy). Trust only private ranges (internal docker networks / proxy).
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # IP allow-list, generated from $ALLOWED_IPS at container start
    # (conf/nginx-entrypoint/30-allowed-ips.sh). When ALLOWED_IPS is empty the
    # generated file is just "allow all;". Applies to the whole site.
    include /etc/nginx/allowed_ips.conf;
    deny all;

    location / {
        proxy_pass http://decs_api_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_ignore_client_abort on;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        send_timeout 600;

        proxy_hide_header Cache-Control;
        proxy_hide_header maxage;
        add_header Cache-Control "public";
    }

    location /static/ {
        alias /app/static_files/;
    }

    # enable compression
    gzip             on;
    gzip_comp_level  2;
    gzip_min_length  1000;
    gzip_proxied     expired no-cache no-store private auth;
    gzip_types       text/plain application/x-javascript text/xml text/css application/xml;

}
